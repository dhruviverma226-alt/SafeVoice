{% extends "base.html" %}
{% block title %}Admin Login — SafeVoice{% endblock %}

{% block content %}
<div class="auth-page">
    <div class="auth-card">
        <h2>Administrator Login</h2>
        <p class="muted">Authorized personnel only.</p>

        <form method="POST" action="{{ url_for('admin_login') }}" novalidate>
            <div class="form-group">
                <label for="email">Admin email</label>
                <input type="email" id="email" name="email" placeholder="admin@university.edu" required autofocus>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Enter your password" required>
            </div>
            <button class="btn btn-primary btn-full" type="submit">Log in</button>
        </form>
    </div>
</div>
{% endblock %}
