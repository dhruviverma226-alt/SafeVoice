{% extends "base.html" %}
{% block title %}Student Login — SafeVoice{% endblock %}

{% block content %}
<div class="auth-box">
    <h2>Student Login</h2>
    <form method="POST">
        <input type="email" name="email" placeholder="Email address" required>
        <input type="password" name="password" placeholder="Password" required>
        <button class="btn full" type="submit">Log in</button>
    </form>
    <p class="muted center">New here?
        <a href="{{ url_for('student_register') }}">Create an account</a>
    </p>
</div>
{% endblock %}
