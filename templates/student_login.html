{% extends "base.html" %}
{% block title %}Student Login — SafeVoice{% endblock %}

{% block content %}
<div class="auth-page">
    <div class="auth-card">
        <h2>Student Login</h2>
        <p class="muted">Welcome back. Please verify your email before logging in.</p>

        <form method="POST" action="{{ url_for('student_login') }}" novalidate>
            <div class="form-group">
                <label for="email">Email address</label>
                <input type="email" id="email" name="email" placeholder="you@university.edu" required autofocus>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Enter your password" required>
            </div>
            <button class="btn btn-teal btn-full" type="submit">Log in</button>
        </form>

        <p class="muted center">New here?
            <a href="{{ url_for('student_register') }}">Create an account</a>
        </p>
    </div>
</div>
{% endblock %}
