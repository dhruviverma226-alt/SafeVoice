{% extends "base.html" %}
{% block title %}Student Registration — SafeVoice{% endblock %}

{% block content %}
<div class="auth-box">
    <h2>Create Student Account</h2>
    <p class="muted">We'll send a verification link to your email.</p>
    <form method="POST">
        <input type="email" name="email" placeholder="Email address" required>
        <input type="password" name="password" placeholder="Password" required>
        <button class="btn full" type="submit">Register</button>
    </form>
    <p class="muted center">Already have an account?
        <a href="{{ url_for('student_login') }}">Log in</a>
    </p>
</div>
{% endblock %}
